<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#03030a" />
  <meta name="robots" content="noindex, nofollow" />

  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-Frame-Options" content="DENY" />
  <meta http-equiv="Referrer-Policy" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'none';" />

  <title>404 // Access Restricted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800;900&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9A%99%3C/text%3E%3C/svg%3E" />
</head>
<body class="denied-page">
  <div class="denied-wrap">
    <div class="denied-card scanline-frame" style="position: relative;">
      <span class="corner-clip tl"></span><span class="corner-clip tr"></span>
      <span class="corner-clip bl"></span><span class="corner-clip br"></span>
      <div class="denied-code glitch-text">404</div>
      <h1>// Access Denied</h1>
      <p>Your device fingerprint has been blocked from accessing this resource. If you believe this is a mistake, contact the site administrator.</p>
      <div class="denied-id" id="denied-id">Loading identifier...</div>
      <div style="margin-top: 24px;">
        <a href="index.html" class="btn btn-ghost">← Return to safety</a>
      </div>
    </div>
  </div>
  <script>
    (function() {
      var el = document.getElementById('denied-id');
      if (!el) return;
      var params = new URLSearchParams(window.location.search);
      var id = params.get('id') || 'unknown';
      if (id.length > 32) id = id.slice(0, 32) + '...';
      el.textContent = 'ID: ' + id;
      if (window.history && window.history.replaceState) {
        try { window.history.replaceState({}, '', window.location.pathname); } catch(e) {}
      }
    })();
  </script>
</body>
</html>
